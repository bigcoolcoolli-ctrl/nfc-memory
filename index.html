<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resonance Keepsakes</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      color: #fff;
      min-height: 100vh;
      background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=2000') center/cover no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 22px;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    .media-box {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .media {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
    }

    video, audio {
      width: 100%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      margin-top: 25px;
      font-size: 26px;
    }

    p {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
      white-space: pre-wrap;
    }

    .slogan {
      margin-top: auto;
      font-size: 13px;
      opacity: 0.75;
      padding-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">RESONANCE KEEPSAKES</div>

  <div class="media-box">
    <div class="media" id="media"></div>
  </div>

  <h1 id="heading"></h1>
  <p id="message"></p>

  <div class="slogan">
    A beautiful place for moments worth keeping
  </div>

</div>

<script>
  const code = new URLSearchParams(window.location.search).get("code");

  const WORKER_URL = "https://dry-unit-8760.workers.dev";

  async function load() {
    const res = await fetch(`${WORKER_URL}/?code=${code}`);
    const data = await res.json();

    document.getElementById("heading").innerText = data.heading || "";
    document.getElementById("message").innerText = data.message || "";

    const media = document.getElementById("media");

    if (data.media_type === "audio") {
      media.innerHTML = `<audio controls src="${data.media_url}"></audio>`;
    } else if (data.media_type === "video") {
      media.innerHTML = `<video controls src="${data.media_url}"></video>`;
    } else {
      media.innerHTML = "";
    }
  }

  load();
</script>

</body>
</html>
