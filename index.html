<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resonance Keepsakes</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=2000') center/cover no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 22px;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      letter-spacing: 2px;
      margin-top: 10px;
      opacity: 0.95;
    }

    .media-box {
      margin-top: 42px;
      display: flex;
      justify-content: center;
    }

    .media {
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    video, audio {
      width: 100%;
      display: block;
    }

    .content {
      margin-top: 28px;
      padding: 0 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 14px;
    }

    p {
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.9;
      white-space: pre-wrap;
    }

    .slogan {
      margin-top: auto;
      padding: 22px 0 10px;
      font-size: 13px;
      opacity: 0.75;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">RESONANCE KEEPSAKES</div>

  <div class="media-box">
    <div class="media" id="media"></div>
  </div>

  <div class="content">
    <h1 id="heading"></h1>
    <p id="message"></p>
  </div>

  <div class="slogan">
    A beautiful place for moments worth keeping
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const recordId = params.get("recordId");

  const WORKER_URL = "https://dry-unit-8760.workers.dev";

  async function load() {
    if (!recordId) return;

    try {
      const res = await fetch(`${WORKER_URL}/?recordId=${recordId}`);
      const data = await res.json();

      document.getElementById("heading").innerText = data.heading || "";
      document.getElementById("message").innerText = data.message || "";

      const media = document.getElementById("media");

      if (data.media_type === "video") {
        media.innerHTML = `<video controls playsinline><source src="${data.media_url}"></video>`;
      } else if (data.media_type === "audio") {
        media.innerHTML = `<audio controls><source src="${data.media_url}"></audio>`;
      } else {
        media.innerHTML = "";
      }

    } catch (e) {
      document.getElementById("heading").innerText = "Memory Not Found";
    }
  }

  load();
</script>

</body>
</html>
